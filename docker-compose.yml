services:
  backend:
    container_name: ${BACKEND_PYTHON_CONTAINER_NAME:-effective-mobile-backend-python}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - ${NETWORK_NAME:-effective-mobile-network}
    environment:
      - PORT=${BACKEND_PORT:-8080}

  nginx:
    container_name: ${NGINX_CONTAINER_NAME:-effective-mobile-nginx}
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    networks:
      - ${NETWORK_NAME:-effective-mobile-network}
    depends_on:
      - backend

networks:
  effective-mobile-network:
    name: ${NETWORK_NAME:-effective-mobile-network}
    driver: bridge